<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tracy's Bible" />
  <meta name="theme-color" content="#c2185b" />
  <meta name="description" content="A personal Bible for Tracy — gifted with love" />

  <title>Tracy's Bible</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css" />

  <!-- App Styles -->
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/glassmorphism.css" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/ios-polish.css" />
</head>
<body>
  <div id="app">
    <main id="main"></main>
    <nav id="nav"></nav>
  </div>

  <!-- iOS Install Prompt -->
  <div id="ios-prompt" style="display:none;position:fixed;bottom:80px;left:16px;right:16px;background:#2d0f2d;border:0.5px solid rgba(194,24,91,0.5);border-radius:16px;padding:16px;z-index:500;font-size:13px;line-height:1.6;color:#fff0f6;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
      <strong style="font-size:14px;">Add to Home Screen</strong>
      <button onclick="document.getElementById('ios-prompt').style.display='none'" style="color:#9a6080;font-size:18px;padding:0 0 0 12px;">✕</button>
    </div>
    <p>Install Tracy's Bible on your iPhone: tap <strong style="color:#f5c842;">Share</strong> <span style="font-size:16px;">⎙</span> then <strong style="color:#f5c842;">"Add to Home Screen"</strong>.</p>
  </div>

  <!-- App Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/caching.js"></script>
  <script src="js/themes.js"></script>
  <script src="js/welcome.js"></script>
  <script src="js/app.js"></script>
  <script>
    // iOS install prompt
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    const prompted = sessionStorage.getItem('ios-prompted');
    if (isIOS && !isStandalone && !prompted) {
      setTimeout(() => {
        document.getElementById('ios-prompt').style.display = 'block';
        sessionStorage.setItem('ios-prompted', '1');
      }, 3000);
    }
  </script>
</body>
</html>
